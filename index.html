<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Monitoring Listrik</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header">
  <h1>Monitoring Listrik</h1>
  <span class="status">Live</span>
</div>

<div class="container">

  <div class="card">
    <h3>Tegangan</h3>
    <div id="tegangan" class="value">0</div>
    <div class="unit">Volt</div>
  </div>

  <div class="card">
    <h3>Arus</h3>
    <div id="arus" class="value">0</div>
    <div class="unit">Ampere</div>
  </div>

  <div class="card">
    <h3>Daya</h3>
    <div id="daya" class="value">0</div>
    <div class="unit">Watt</div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
